<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CodeCraftHub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    /* ── Variables ─────────────────────────────────────────────────────────── */
    :root {
      --bg:        #0d0f12;
      --surface:   #13161b;
      --surface2:  #1a1e25;
      --border:    #242830;
      --accent:    #00e5a0;
      --accent2:   #005c40;
      --danger:    #ff4d6d;
      --warn:      #ffb627;
      --text:      #e8ecf0;
      --muted:     #5a6070;
      --radius:    10px;
      --mono:      'DM Mono', monospace;
      --sans:      'Syne', sans-serif;
      --transition: 0.18s ease;
    }

    /* ── Reset ─────────────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 15px; scroll-behavior: smooth; }
    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
    }

    /* ── Layout ────────────────────────────────────────────────────────────── */
    .app {
      display: grid;
      grid-template-rows: auto auto 1fr;
      min-height: 100vh;
    }

    /* ── Header ────────────────────────────────────────────────────────────── */
    header {
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 60px;
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 100;
    }
    .logo {
      font-size: 1.1rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      color: var(--text);
    }
    .logo span { color: var(--accent); }
    .header-right {
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    #api-status {
      font-family: var(--mono);
      font-size: 0.7rem;
      padding: 3px 10px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    #api-status .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--muted);
      transition: background var(--transition);
    }
    #api-status.online .dot  { background: var(--accent); box-shadow: 0 0 6px var(--accent); }
    #api-status.offline .dot { background: var(--danger); }

    /* ── Stats Bar ─────────────────────────────────────────────────────────── */
    .stats-bar {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1px;
      background: var(--border);
      border-bottom: 1px solid var(--border);
    }
    .stat-card {
      background: var(--surface);
      padding: 1.2rem 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 2px;
      transition: background var(--transition);
    }
    .stat-card:hover { background: var(--surface2); }
    .stat-label {
      font-family: var(--mono);
      font-size: 0.65rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .stat-value {
      font-size: 1.8rem;
      font-weight: 800;
      line-height: 1;
      color: var(--text);
      transition: color var(--transition);
    }
    .stat-card.total  .stat-value { color: var(--accent); }
    .stat-card.ns     .stat-value { color: var(--muted); }
    .stat-card.ip     .stat-value { color: var(--warn); }
    .stat-card.done   .stat-value { color: var(--accent); }

    /* ── Main ──────────────────────────────────────────────────────────────── */
    main {
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 0;
      align-items: start;
    }

    /* ── Sidebar / Form ────────────────────────────────────────────────────── */
    .sidebar {
      border-right: 1px solid var(--border);
      padding: 1.5rem;
      position: sticky;
      top: 60px;
      max-height: calc(100vh - 60px);
      overflow-y: auto;
    }
    .form-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.2rem;
    }
    .form-title {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
    }
    #cancel-edit {
      display: none;
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--danger);
      background: none;
      border: 1px solid var(--danger);
      border-radius: 4px;
      padding: 2px 8px;
      cursor: pointer;
      transition: background var(--transition);
    }
    #cancel-edit:hover { background: rgba(255,77,109,0.1); }

    .form-group { margin-bottom: 1rem; }
    label {
      display: block;
      font-family: var(--mono);
      font-size: 0.68rem;
      color: var(--muted);
      margin-bottom: 5px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    input, textarea, select {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--mono);
      font-size: 0.82rem;
      padding: 0.6rem 0.8rem;
      outline: none;
      transition: border-color var(--transition), box-shadow var(--transition);
      appearance: none;
    }
    input:focus, textarea:focus, select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0,229,160,0.08);
    }
    textarea { resize: vertical; min-height: 80px; }
    select option { background: var(--surface2); }

    .btn {
      width: 100%;
      padding: 0.7rem 1rem;
      border: none;
      border-radius: var(--radius);
      font-family: var(--sans);
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: all var(--transition);
    }
    .btn-primary {
      background: var(--accent);
      color: #0d0f12;
    }
    .btn-primary:hover {
      background: #00ffb3;
      box-shadow: 0 0 20px rgba(0,229,160,0.25);
    }
    .btn-primary:active { transform: scale(0.98); }

    /* form mode indicator */
    .mode-badge {
      display: inline-block;
      font-family: var(--mono);
      font-size: 0.65rem;
      padding: 2px 8px;
      border-radius: 20px;
      margin-bottom: 1rem;
      transition: all var(--transition);
    }
    .mode-badge.create { background: rgba(0,229,160,0.1); color: var(--accent); border: 1px solid var(--accent2); }
    .mode-badge.edit   { background: rgba(255,182,39,0.1); color: var(--warn);   border: 1px solid rgba(255,182,39,0.3); }

    /* ── Content ───────────────────────────────────────────────────────────── */
    .content { padding: 1.5rem; }

    .content-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.2rem;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .content-title {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
    }

    /* Search + Filter */
    .controls {
      display: flex;
      gap: 0.5rem;
      flex: 1;
      justify-content: flex-end;
      flex-wrap: wrap;
    }
    .controls input, .controls select {
      width: auto;
      min-width: 160px;
      padding: 0.45rem 0.75rem;
      font-size: 0.75rem;
    }

    /* ── Course Cards ──────────────────────────────────────────────────────── */
    #courses-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .course-card {
      background: var(--surface);
      padding: 1.2rem;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      transition: background var(--transition);
      animation: fadeIn 0.25s ease both;
    }
    .course-card:hover { background: var(--surface2); }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 0.5rem;
    }
    .course-name {
      font-size: 0.92rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1.3;
    }
    .status-badge {
      font-family: var(--mono);
      font-size: 0.6rem;
      padding: 2px 8px;
      border-radius: 20px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .status-badge.not-started { background: rgba(90,96,112,0.2); color: var(--muted); border: 1px solid var(--border); }
    .status-badge.in-progress { background: rgba(255,182,39,0.12); color: var(--warn); border: 1px solid rgba(255,182,39,0.25); }
    .status-badge.completed   { background: rgba(0,229,160,0.1);  color: var(--accent); border: 1px solid var(--accent2); }

    .course-desc {
      font-family: var(--mono);
      font-size: 0.73rem;
      color: var(--muted);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .card-meta {
      font-family: var(--mono);
      font-size: 0.65rem;
      color: var(--muted);
      opacity: 0.6;
    }
    .card-actions {
      display: flex;
      gap: 0.5rem;
      margin-top: auto;
      padding-top: 0.6rem;
      border-top: 1px solid var(--border);
    }
    .btn-action {
      flex: 1;
      padding: 0.4rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: none;
      font-family: var(--mono);
      font-size: 0.7rem;
      cursor: pointer;
      transition: all var(--transition);
    }
    .btn-edit  { color: var(--warn); }
    .btn-edit:hover  { background: rgba(255,182,39,0.1); border-color: rgba(255,182,39,0.4); }
    .btn-delete { color: var(--danger); }
    .btn-delete:hover { background: rgba(255,77,109,0.1); border-color: rgba(255,77,109,0.4); }

    /* ── Empty / Loading / Error states ───────────────────────────────────── */
    .state-message {
      grid-column: 1 / -1;
      padding: 3rem 1rem;
      text-align: center;
      font-family: var(--mono);
      font-size: 0.8rem;
      color: var(--muted);
      background: var(--surface);
    }
    .state-message .icon { font-size: 2rem; display: block; margin-bottom: 0.5rem; }
    .spinner {
      width: 20px; height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 0.75rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Toast ─────────────────────────────────────────────────────────────── */
    #toast {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      font-family: var(--mono);
      font-size: 0.78rem;
      padding: 0.65rem 1.1rem;
      border-radius: var(--radius);
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
      transform: translateY(10px);
      opacity: 0;
      transition: all 0.22s ease;
      pointer-events: none;
      z-index: 999;
      max-width: 320px;
    }
    #toast.show { opacity: 1; transform: translateY(0); }
    #toast.success { border-color: var(--accent2); color: var(--accent); }
    #toast.error   { border-color: rgba(255,77,109,0.4); color: var(--danger); }

    /* ── Delete confirm modal ──────────────────────────────────────────────── */
    #modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(3px);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }
    #modal-overlay.open { display: flex; }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.8rem;
      max-width: 360px;
      width: 90%;
      animation: fadeIn 0.2s ease;
    }
    .modal h3 { font-size: 1rem; margin-bottom: 0.5rem; }
    .modal p  { font-family: var(--mono); font-size: 0.78rem; color: var(--muted); margin-bottom: 1.4rem; }
    .modal-actions { display: flex; gap: 0.75rem; }
    .btn-cancel-modal {
      flex: 1; padding: 0.6rem;
      background: none; border: 1px solid var(--border);
      border-radius: var(--radius); color: var(--muted);
      font-family: var(--sans); font-weight: 600;
      cursor: pointer; transition: all var(--transition);
    }
    .btn-cancel-modal:hover { border-color: var(--muted); color: var(--text); }
    .btn-confirm-delete {
      flex: 1; padding: 0.6rem;
      background: var(--danger); border: none;
      border-radius: var(--radius); color: #fff;
      font-family: var(--sans); font-weight: 700;
      cursor: pointer; transition: all var(--transition);
    }
    .btn-confirm-delete:hover { background: #ff2d52; box-shadow: 0 0 16px rgba(255,77,109,0.3); }

    /* ── Responsive ────────────────────────────────────────────────────────── */
    @media (max-width: 800px) {
      main { grid-template-columns: 1fr; }
      .sidebar { position: static; max-height: none; border-right: none; border-bottom: 1px solid var(--border); }
      .stats-bar { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 480px) {
      .stats-bar { grid-template-columns: repeat(2, 1fr); }
      header { padding: 0 1rem; }
      .content, .sidebar { padding: 1rem; }
    }
  </style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <header>
    <div class="logo">Code<span>Craft</span>Hub</div>
    <div class="header-right">
      <div id="api-status">
        <span class="dot"></span>
        <span id="api-status-text">connecting</span>
      </div>
    </div>
  </header>

  <!-- Stats Bar -->
  <div class="stats-bar">
    <div class="stat-card total">
      <span class="stat-label">Total Courses</span>
      <span class="stat-value" id="stat-total">—</span>
    </div>
    <div class="stat-card ns">
      <span class="stat-label">Not Started</span>
      <span class="stat-value" id="stat-ns">—</span>
    </div>
    <div class="stat-card ip">
      <span class="stat-label">In Progress</span>
      <span class="stat-value" id="stat-ip">—</span>
    </div>
    <div class="stat-card done">
      <span class="stat-label">Completed</span>
      <span class="stat-value" id="stat-done">—</span>
    </div>
  </div>

  <!-- Main -->
  <main>
    <!-- Sidebar: Add / Edit Form -->
    <aside class="sidebar">
      <div class="form-header">
        <span class="form-title">Course</span>
        <button id="cancel-edit" onclick="cancelEdit()">✕ cancel edit</button>
      </div>
      <span class="mode-badge create" id="mode-badge">+ new course</span>

      <form id="course-form" onsubmit="handleSubmit(event)">
        <input type="hidden" id="edit-id" />

        <div class="form-group">
          <label for="f-name">Name</label>
          <input id="f-name" type="text" placeholder="e.g. React Fundamentals" maxlength="200" required />
        </div>

        <div class="form-group">
          <label for="f-desc">Description</label>
          <textarea id="f-desc" placeholder="What will you learn?" maxlength="1000" required></textarea>
        </div>

        <div class="form-group">
          <label for="f-date">Target Completion Date</label>
          <input id="f-date" type="date" required />
        </div>

        <div class="form-group">
          <label for="f-status">Status</label>
          <select id="f-status" required>
            <option value="Not Started">Not Started</option>
            <option value="In Progress">In Progress</option>
            <option value="Completed">Completed</option>
          </select>
        </div>

        <button type="submit" class="btn btn-primary" id="submit-btn">Add Course</button>
      </form>
    </aside>

    <!-- Content: Course List -->
    <section class="content">
      <div class="content-header">
        <span class="content-title">Courses</span>
        <div class="controls">
          <input type="text" id="search-input" placeholder="Search..." oninput="filterCourses()" />
          <select id="filter-status" onchange="filterCourses()">
            <option value="">All Statuses</option>
            <option value="Not Started">Not Started</option>
            <option value="In Progress">In Progress</option>
            <option value="Completed">Completed</option>
          </select>
        </div>
      </div>

      <div id="courses-list">
        <div class="state-message">
          <div class="spinner"></div>
          Loading courses...
        </div>
      </div>
    </section>
  </main>
</div>

<!-- Delete Confirm Modal -->
<div id="modal-overlay">
  <div class="modal">
    <h3>Delete course?</h3>
    <p id="modal-course-name">This action cannot be undone.</p>
    <div class="modal-actions">
      <button class="btn-cancel-modal" onclick="closeModal()">Cancel</button>
      <button class="btn-confirm-delete" onclick="confirmDelete()">Delete</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script>
  // ── Config ──────────────────────────────────────────────────────────────────
  // Update this to your Render URL once deployed
  const API_BASE = 'https://codecrafthub.onrender.com/api';

  // ── State ───────────────────────────────────────────────────────────────────
  let allCourses  = [];
  let deleteTarget = null;

  // ── Init ────────────────────────────────────────────────────────────────────
  document.addEventListener('DOMContentLoaded', () => {
    loadCourses();
    loadStats();
    // Set date default to 30 days from now
    const d = new Date();
    d.setDate(d.getDate() + 30);
    document.getElementById('f-date').value = d.toISOString().split('T')[0];
  });

  // ── API helpers ─────────────────────────────────────────────────────────────
  async function apiFetch(path, options = {}) {
    const res = await fetch(`${API_BASE}${path}`, {
      headers: { 'Content-Type': 'application/json' },
      ...options,
    });
    const json = await res.json();
    if (!res.ok) throw new Error(json.message || json.errors?.[0]?.message || 'API error');
    return json;
  }

  // ── Load courses ─────────────────────────────────────────────────────────────
  async function loadCourses() {
    showListState('loading');
    try {
      const data = await apiFetch('/courses?limit=100');
      allCourses = data.data || [];
      setApiStatus(true);
      filterCourses();
    } catch (e) {
      setApiStatus(false);
      showListState('error', e.message);
    }
  }

  async function loadStats() {
    try {
      const data = await apiFetch('/courses/stats');
      const s = data.data;
      document.getElementById('stat-total').textContent = s.total;
      document.getElementById('stat-ns').textContent   = s.byStatus['Not Started'];
      document.getElementById('stat-ip').textContent   = s.byStatus['In Progress'];
      document.getElementById('stat-done').textContent = s.byStatus['Completed'];
    } catch (_) {}
  }

  // ── Filter / Render ──────────────────────────────────────────────────────────
  function filterCourses() {
    const search = document.getElementById('search-input').value.toLowerCase();
    const status = document.getElementById('filter-status').value;

    const filtered = allCourses.filter(c => {
      const matchSearch = !search ||
        c.name.toLowerCase().includes(search) ||
        c.description.toLowerCase().includes(search);
      const matchStatus = !status || c.status === status;
      return matchSearch && matchStatus;
    });

    renderCourses(filtered);
  }

  function renderCourses(courses) {
    const list = document.getElementById('courses-list');
    if (!courses.length) {
      list.innerHTML = `<div class="state-message"><span class="icon">📭</span>No courses found.</div>`;
      return;
    }
    list.innerHTML = courses.map((c, i) => `
      <div class="course-card" style="animation-delay:${i * 0.04}s">
        <div class="card-top">
          <span class="course-name">${escHtml(c.name)}</span>
          <span class="status-badge ${statusClass(c.status)}">${escHtml(c.status)}</span>
        </div>
        <p class="course-desc">${escHtml(c.description)}</p>
        <span class="card-meta">Due ${formatDate(c.completionDate)}</span>
        <div class="card-actions">
          <button class="btn-action btn-edit"   onclick="editCourse('${c.id}')">✎ Edit</button>
          <button class="btn-action btn-delete" onclick="openDeleteModal('${c.id}', '${escHtml(c.name).replace(/'/g,"\\'")}')">✕ Delete</button>
        </div>
      </div>
    `).join('');
  }

  // ── Create / Update ──────────────────────────────────────────────────────────
  async function handleSubmit(e) {
    e.preventDefault();
    const id   = document.getElementById('edit-id').value;
    const body = {
      name:           document.getElementById('f-name').value,
      description:    document.getElementById('f-desc').value,
      completionDate: document.getElementById('f-date').value,
      status:         document.getElementById('f-status').value,
    };

    const btn = document.getElementById('submit-btn');
    btn.textContent = 'Saving...';
    btn.disabled = true;

    try {
      if (id) {
        await apiFetch(`/courses/${id}`, { method: 'PUT', body: JSON.stringify(body) });
        toast('Course updated', 'success');
      } else {
        await apiFetch('/courses', { method: 'POST', body: JSON.stringify(body) });
        toast('Course added', 'success');
      }
      cancelEdit();
      await loadCourses();
      await loadStats();
    } catch (err) {
      toast(err.message, 'error');
    } finally {
      btn.textContent = id ? 'Save Changes' : 'Add Course';
      btn.disabled = false;
    }
  }

  // ── Edit ─────────────────────────────────────────────────────────────────────
  function editCourse(id) {
    const c = allCourses.find(x => x.id === id);
    if (!c) return;
    document.getElementById('edit-id').value    = c.id;
    document.getElementById('f-name').value     = c.name;
    document.getElementById('f-desc').value     = c.description;
    document.getElementById('f-date').value     = c.completionDate;
    document.getElementById('f-status').value   = c.status;
    document.getElementById('submit-btn').textContent = 'Save Changes';
    document.getElementById('cancel-edit').style.display = 'block';
    document.getElementById('mode-badge').textContent = '✎ editing';
    document.getElementById('mode-badge').className = 'mode-badge edit';
    document.querySelector('.sidebar').scrollIntoView({ behavior: 'smooth' });
  }

  function cancelEdit() {
    document.getElementById('course-form').reset();
    document.getElementById('edit-id').value = '';
    document.getElementById('submit-btn').textContent = 'Add Course';
    document.getElementById('cancel-edit').style.display = 'none';
    document.getElementById('mode-badge').textContent = '+ new course';
    document.getElementById('mode-badge').className = 'mode-badge create';
    const d = new Date();
    d.setDate(d.getDate() + 30);
    document.getElementById('f-date').value = d.toISOString().split('T')[0];
  }

  // ── Delete ───────────────────────────────────────────────────────────────────
  function openDeleteModal(id, name) {
    deleteTarget = id;
    document.getElementById('modal-course-name').textContent = `"${name}" will be permanently deleted.`;
    document.getElementById('modal-overlay').classList.add('open');
  }

  function closeModal() {
    deleteTarget = null;
    document.getElementById('modal-overlay').classList.remove('open');
  }

  async function confirmDelete() {
    if (!deleteTarget) return;
    closeModal();
    try {
      await apiFetch(`/courses/${deleteTarget}`, { method: 'DELETE' });
      toast('Course deleted', 'success');
      await loadCourses();
      await loadStats();
    } catch (err) {
      toast(err.message, 'error');
    }
  }

  // ── UI helpers ────────────────────────────────────────────────────────────────
  function showListState(type, msg = '') {
    const list = document.getElementById('courses-list');
    if (type === 'loading') {
      list.innerHTML = `<div class="state-message"><div class="spinner"></div>Loading courses…</div>`;
    } else if (type === 'error') {
      list.innerHTML = `<div class="state-message"><span class="icon">⚠️</span>Could not reach the API.<br><small>${escHtml(msg)}</small></div>`;
    }
  }

  function setApiStatus(online) {
    const el = document.getElementById('api-status');
    const tx = document.getElementById('api-status-text');
    el.className = online ? 'online' : 'offline';
    tx.textContent = online ? 'api online' : 'api offline';
  }

  let toastTimer;
  function toast(msg, type = 'success') {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = `show ${type}`;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { el.className = ''; }, 3000);
  }

  function statusClass(s) {
    return s === 'Completed' ? 'completed' : s === 'In Progress' ? 'in-progress' : 'not-started';
  }

  function formatDate(d) {
    if (!d) return '—';
    const [y, m, day] = d.split('-');
    return `${day}/${m}/${y}`;
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // Close modal on overlay click
  document.getElementById('modal-overlay').addEventListener('click', e => {
    if (e.target === e.currentTarget) closeModal();
  });
</script>
</body>
</html>
